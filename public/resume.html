<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhavani Baskaran — Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:110px 40px 60px; background:var(--bg-deep); }
    .resume-header { text-align:center; margin-bottom:40px; }
    .resume-header p { font-size:13px; color:var(--text-secondary); font-family:var(--font-display); font-weight:400; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; color:var(--accent); }
    .resume-header h1 { font-family:var(--font-display); font-size:clamp(28px,4vw,48px); font-weight:800; letter-spacing:-1px; }
    .resume-actions { display:flex; gap:16px; justify-content:center; margin-top:28px; flex-wrap:wrap; }
    iframe { width:min(820px,100%); height:680px; border:1px solid var(--border); border-radius:var(--radius-lg); display:block; margin:0 auto; }
    .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); text-decoration:none; font-size:13px; margin-bottom:24px; transition:color 0.2s; }
    .back-link:hover { color:var(--accent); }
  </style>
</head>
<body>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
  <div class="resume-header">
    <p>My Resume</p>
    <h1>Bhavani Baskaran</h1>
    <div class="resume-actions">
      <a href="resume.pdf" download class="btn-primary"><i class="fas fa-download"></i> Download PDF</a>
      <a href="mailto:bhavanibaskaran10@gmail.com" class="btn-secondary"><i class="fas fa-envelope"></i> Email Me</a>
    </div>
  </div>
  <iframe src="resume.pdf" title="Bhavani Baskaran Resume"></iframe>
</body>
</html>
